name: python-app-ci

# Reusable workflow for nos-tromo Python apps (chorus, docint, Nextext, translator).
# Runs pre-commit (ruff-check + ruff-format + mypy via the repo's .pre-commit-config.yaml),
# pytest, and optionally docker builds + a React/pnpm frontend.

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'JSON list of Python versions, e.g. ''["3.11","3.12","3.13"]''. Lint always uses the first element.'
        required: true
        type: string
      uv-sync-args:
        description: 'Args passed verbatim to `uv sync` (e.g. "--frozen --group dev --extra cpu").'
        required: false
        type: string
        default: '--frozen --group dev'
      docker-build:
        description: 'Run `docker compose build` to validate that the app images build.'
        required: false
        type: boolean
        default: false
      docker-compose-files:
        description: 'Compose files for `docker compose build`. Default mirrors the federation layout: docker/compose.yaml + docker/compose.override.yaml.'
        required: false
        type: string
        default: '-f docker/compose.yaml -f docker/compose.override.yaml'
      docker-compose-profiles:
        description: 'Profiles for `docker compose build` (e.g. "--profile cpu"). Required for repos that gate services behind a profile.'
        required: false
        type: string
        default: ''
      free-disk-space:
        description: 'Free runner disk before the docker job (needed for fastembed/torch images).'
        required: false
        type: boolean
        default: true
      frontend-build:
        description: 'Build the React/pnpm frontend in <frontend-dir>.'
        required: false
        type: boolean
        default: false
      frontend-dir:
        required: false
        type: string
        default: 'frontend'
      node-version:
        required: false
        type: string
        default: '20'
      pnpm-version:
        required: false
        type: string
        default: '9.12.0'
      pytest-args:
        required: false
        type: string
        default: ''
      test-env:
        description: 'Multiline KEY=VALUE pairs (one per line) appended to $GITHUB_ENV before pytest. For apps whose imports require env vars at module-scope (e.g. translator''s OPENAI_API_BASE).'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Resolve canonical strict-config ref
        id: canonical-ref
        env:
          # github.workflow_ref is e.g.
          #   nos-tromo/.github/.github/workflows/python-app-ci.yml@refs/tags/v2
          # Set by GitHub for the reusable workflow itself; we strip
          # everything up to and including the '@' to recover the ref.
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          ref="${WORKFLOW_REF##*@}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
      - name: Checkout canonical strict-config
        uses: actions/checkout@v6
        with:
          repository: nos-tromo/.github
          ref: ${{ steps.canonical-ref.outputs.ref }}
          path: .nos-tromo-github-ref
      - name: Validate strict-config alignment
        run: python3 .nos-tromo-github-ref/scripts/validate_strict_config.py
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/uv.lock'
      - name: Pick lint Python version
        id: pyver
        env:
          PY_VERSIONS: ${{ inputs.python-versions }}
        run: |
          first=$(printf '%s' "$PY_VERSIONS" | python3 -c "import json,sys;print(json.load(sys.stdin)[0])")
          echo "version=$first" >> "$GITHUB_OUTPUT"
      - name: Pin Python
        env:
          PYVER: ${{ steps.pyver.outputs.version }}
        run: uv python pin "$PYVER"
      - name: Sync dev environment
        env:
          UV_SYNC_ARGS: ${{ inputs.uv-sync-args }}
        run: uv sync $UV_SYNC_ARGS
      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.python-versions) }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/uv.lock'
      - name: Pin Python
        env:
          PYVER: ${{ matrix.python-version }}
        run: uv python pin "$PYVER"
      - name: Sync environment
        env:
          UV_SYNC_ARGS: ${{ inputs.uv-sync-args }}
        run: uv sync $UV_SYNC_ARGS
      - name: Inject test env vars
        if: ${{ inputs.test-env != '' }}
        env:
          INPUT_ENV: ${{ inputs.test-env }}
        run: printf '%s\n' "$INPUT_ENV" >> "$GITHUB_ENV"
      - name: Run pytest
        env:
          PYTEST_ARGS: ${{ inputs.pytest-args }}
        run: uv run --no-sync pytest $PYTEST_ARGS

  frontend:
    if: ${{ inputs.frontend-build }}
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ inputs.frontend-dir }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: ${{ inputs.frontend-dir }}/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build

  docker:
    if: ${{ inputs.docker-build }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Free disk space
        if: ${{ inputs.free-disk-space }}
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Create external networks
        # Every app's compose declares inference-net and data-net as external;
        # `docker compose build` resolves the compose file before building, so
        # these must exist or resolution fails.
        run: |
          docker network create inference-net >/dev/null 2>&1 || true
          docker network create data-net >/dev/null 2>&1 || true
      - name: Stub .env
        # Compose files reference `--env-file .env` in every consumer Makefile;
        # a missing .env causes compose to error before build starts. The
        # placeholder values cover any ${VAR}-substituted fields without
        # implying real secrets.
        run: |
          if [ ! -f .env ]; then
            {
              echo "NEO4J_PASSWORD=ci-placeholder-not-real"
              echo "OPENAI_API_KEY=sk-ci-placeholder"
              echo "OPENAI_API_BASE=http://test-host:11434/v1"
            } > .env
          fi
      - name: Build images
        env:
          DOCKER_BUILDKIT: '1'
          FILES: ${{ inputs.docker-compose-files }}
          PROFILES: ${{ inputs.docker-compose-profiles }}
        run: docker compose --env-file .env $FILES $PROFILES build
