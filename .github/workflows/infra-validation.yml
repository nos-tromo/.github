name: infra-validation

# Reusable workflow for nos-tromo infra repos (vllm-service, data-plane).
# Validates compose syntax, lints YAML, lints Dockerfiles, lints shell scripts.

on:
  workflow_call:
    inputs:
      compose-files:
        description: 'Space-separated -f arguments for `docker compose config`. Example: "-f docker/compose.yaml -f docker/compose.override.yaml".'
        required: true
        type: string
      compose-profiles:
        description: 'Space-separated --profile arguments. Example: "--profile cpu --profile cuda".'
        required: false
        type: string
        default: ''
      dockerfiles-glob:
        description: 'Glob for hadolint. Defaults to docker/Dockerfile.*.'
        required: false
        type: string
        default: 'docker/Dockerfile.*'
      shell-scripts-glob:
        description: 'Glob for shellcheck. Defaults to scripts/*.sh.'
        required: false
        type: string
        default: 'scripts/*.sh'

permissions:
  contents: read

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install yamllint
        run: pipx install yamllint
      - name: Lint YAML
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: disable, document-start: disable}}" .

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        env:
          GLOB: ${{ inputs.shell-scripts-glob }}
        run: |
          shopt -s nullglob
          # shellcheck disable=SC2086
          files=( $GLOB )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts matched $GLOB; skipping."
            exit 0
          fi
          shellcheck "${files[@]}"

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run hadolint on Dockerfiles
        env:
          GLOB: ${{ inputs.dockerfiles-glob }}
        run: |
          shopt -s nullglob
          # shellcheck disable=SC2086
          files=( $GLOB )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No Dockerfiles matched $GLOB; skipping."
            exit 0
          fi
          for f in "${files[@]}"; do
            # Fail only on hadolint `error`-level findings; warnings/info/style
            # are surfaced in the log but don't block the build. Consumers that
            # want stricter checking can drop a .hadolint.yaml in the repo.
            docker run --rm -i ghcr.io/hadolint/hadolint:v2.12.0 hadolint --failure-threshold error - < "$f"
          done

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Stub external networks + volumes
        # External resources declared in compose must exist before `docker compose
        # config` will resolve. Create idempotently; mirrors `make network`.
        run: |
          docker network create inference-net >/dev/null 2>&1 || true
          docker network create data-net >/dev/null 2>&1 || true
          docker volume create huggingface-cache >/dev/null 2>&1 || true
      - name: Stub required env vars
        # Placeholder values for variable interpolation only; never committed.
        run: |
          {
            echo "NEO4J_PASSWORD=ci-placeholder-not-real"
            echo "OPENAI_API_KEY=sk-ci-placeholder"
          } > .env
      - name: Validate compose
        env:
          FILES: ${{ inputs.compose-files }}
          PROFILES: ${{ inputs.compose-profiles }}
        run: docker compose --env-file .env $FILES $PROFILES config --quiet

  make-common:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Resolve canonical ref
        id: canonical-ref
        env:
          # github.job_workflow_ref points to THIS reusable workflow (repo@ref);
          # strip up to and including '@' to recover the ref the consumer pinned.
          # Routed through env: to keep it off the shell command line.
          WORKFLOW_REF: ${{ github.job_workflow_ref }}
        run: |
          ref="${WORKFLOW_REF##*@}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
      - name: Checkout canonical .github
        uses: actions/checkout@v6
        with:
          repository: nos-tromo/.github
          ref: ${{ steps.canonical-ref.outputs.ref }}
          path: .nos-tromo-github-ref
      - name: Validate make/common.mk alignment
        # Skips automatically until the repo vendors make/common.mk; fails only
        # on a drifted vendored copy.
        run: python3 .nos-tromo-github-ref/scripts/validate_make_common.py
