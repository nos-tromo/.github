name: self-ci

# Self-CI for the org-wide .github repo. The repo's two main workflows are
# reusable (`on: workflow_call`) and don't fire on pushes here — without this
# file, nothing would lint or test the validator script that gatekeeps every
# consumer's strict-mode regime.
#
# Jobs:
#   lint-validator      — `ruff check` + `ruff format --check` against scripts/
#                         using the canonical strict config, pinned to the same
#                         ruff version consumers use (read out of
#                         precommit-versions.yaml so there's one source of truth).
#   validator-smoke     — validate_strict_config.py vs aligned (must exit 0),
#                         drifted (non-zero), and half-migrated (non-zero)
#                         fixtures. Catches regressions in the validator itself.
#   make-common-smoke   — validate_make_common.py vs its aligned/drifted/absent/
#                         included-but-absent fixtures.
#   bundle-lib-smoke    — validate_bundle_lib.py vs its fixtures, plus the
#                         bundle_version / bundle_checkout_release behavior scripts.
#   eslint-config-smoke — validate_eslint_config.py vs its aligned/drifted/absent
#                         fixtures.
#   release-tag-unit    — pytest suite for actions/release-tag/extract_version.py
#                         (the version extractor + anti-downgrade comparator).
#
# Security note: no step interpolates untrusted user input from
# github.event.*; the only `${{ ... }}` reference is a step output we
# generated ourselves, and it is still routed through `env:` to keep it out
# of the shell command line.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Read pinned ruff version
        id: ruff
        run: |
          # precommit-versions.yaml stores `ruff: v0.15.14`; uvx wants the
          # bare PyPI version, so strip the leading `v`.
          v=$(grep '^ruff:' configs/python-strict/precommit-versions.yaml \
              | awk '{print $2}' | tr -d '"' | sed 's/^v//')
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Ruff check
        env:
          VER: ${{ steps.ruff.outputs.version }}
        run: uvx "ruff@$VER" check --config configs/python-strict/ruff.toml scripts/
      - name: Ruff format --check
        env:
          VER: ${{ steps.ruff.outputs.version }}
        run: uvx "ruff@$VER" format --config configs/python-strict/ruff.toml --check scripts/

  validator-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Aligned fixture should pass
        # Also exercises the `target-version` allowed-override path: the
        # aligned fixture deliberately sets target-version to py312 while
        # canonical is py311.
        run: python3 scripts/validate_strict_config.py --consumer-root tests/fixtures/aligned
      - name: Drifted fixture should fail
        run: |
          if python3 scripts/validate_strict_config.py --consumer-root tests/fixtures/drifted; then
            echo "Bug: validator returned 0 on a drifted fixture" >&2
            exit 1
          fi
          echo "OK: validator correctly returned non-zero on drift"
      - name: Half-migrated fixture should fail (mypy not removed)
        # Correct pyrefly setup but leftover mypy ([tool.mypy] block, dev dep,
        # hook): a half-migration must fail CI, not silently pass with two
        # type-checkers installed.
        run: |
          if python3 scripts/validate_strict_config.py --consumer-root tests/fixtures/half-migrated; then
            echo "Bug: validator returned 0 when mypy was left behind" >&2
            exit 1
          fi
          echo "OK: validator rejects a half-migration (mypy leftover)"

  make-common-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Aligned fixture should pass
        # tests/fixtures/mk-aligned/make/common.mk must mirror
        # configs/make-common/common.mk exactly - this job fails if it drifts,
        # the same signal a real consumer gets.
        run: python3 scripts/validate_make_common.py --consumer-root tests/fixtures/mk-aligned
      - name: Drifted fixture should fail
        run: |
          if python3 scripts/validate_make_common.py --consumer-root tests/fixtures/mk-drifted; then
            echo "Bug: validator returned 0 on a drifted fixture" >&2
            exit 1
          fi
          echo "OK: validator correctly returned non-zero on drift"
      - name: Absent + not included should skip (pass)
        run: python3 scripts/validate_make_common.py --consumer-root tests/fixtures/mk-absent
      - name: Included-but-absent fixture should fail
        # Makefile has `include make/common.mk` but no vendored copy -> required.
        run: |
          if python3 scripts/validate_make_common.py --consumer-root tests/fixtures/mk-required-absent; then
            echo "Bug: validator returned 0 when the Makefile includes common.mk but it is absent" >&2
            exit 1
          fi
          echo "OK: validator correctly failed on included-but-absent common.mk"

  bundle-lib-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Aligned fixture should pass
        # tests/fixtures/bundle-aligned/scripts/bundle-lib.sh must mirror
        # configs/bundle/bundle-lib.sh exactly - this job fails if it drifts.
        run: python3 scripts/validate_bundle_lib.py --consumer-root tests/fixtures/bundle-aligned
      - name: Drifted fixture should fail
        run: |
          if python3 scripts/validate_bundle_lib.py --consumer-root tests/fixtures/bundle-drifted; then
            echo "Bug: validator returned 0 on a drifted fixture" >&2
            exit 1
          fi
          echo "OK: validator correctly returned non-zero on drift"
      - name: Absent + no wrapper should skip (pass)
        run: python3 scripts/validate_bundle_lib.py --consumer-root tests/fixtures/bundle-absent
      - name: Sourced-but-absent fixture should fail
        # scripts/bundle_images.sh sources bundle-lib.sh but no vendored copy -> required.
        run: |
          if python3 scripts/validate_bundle_lib.py --consumer-root tests/fixtures/bundle-required-absent; then
            echo "Bug: validator returned 0 when bundle_images.sh sources bundle-lib.sh but it is absent" >&2
            exit 1
          fi
          echo "OK: validator correctly failed on sourced-but-absent bundle-lib.sh"
      - name: bundle_version behavior (override > annotated tag > date+sha)
        run: bash tests/bundle_version_smoke.sh
      - name: bundle_checkout_release behavior (resolve tag, checkout+restore, refuse dirty/no-tag)
        run: bash tests/bundle_checkout_smoke.sh

  eslint-config-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Aligned fixture should pass
        # tests/fixtures/eslint-aligned/frontend/eslint.config.js must mirror
        # configs/frontend-eslint/eslint.config.js exactly - this job fails if it drifts.
        run: python3 scripts/validate_eslint_config.py --consumer-root tests/fixtures/eslint-aligned
      - name: Drifted fixture should fail
        run: |
          if python3 scripts/validate_eslint_config.py --consumer-root tests/fixtures/eslint-drifted; then
            echo "Bug: validator returned 0 on a drifted fixture" >&2
            exit 1
          fi
          echo "OK: validator correctly returned non-zero on drift"
      - name: Absent vendored copy should skip (pass)
        run: python3 scripts/validate_eslint_config.py --consumer-root tests/fixtures/eslint-absent

  release-tag-unit:
    # Unit tests for actions/release-tag/extract_version.py — the version
    # extractor and anti-downgrade comparator the release-tag action depends on.
    # Nothing else in the repo exercises them, so without this job the action
    # would ship untested. Run via uv with an ephemeral pytest (the module is
    # stdlib-only); pin Python 3.11 to match the action's own runtime.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Pytest
        working-directory: actions/release-tag
        run: uv run --python 3.11 --with pytest python -m pytest -q
