# Canonical strict ruff config for nos-tromo Python apps.
#
# Mirror this file's contents into each consumer's pyproject.toml under
# [tool.ruff]. The validate_strict_config.py check in python-app-ci.yml
# diffs the consumer's [tool.ruff] block against this file and fails CI
# on drift. The only key a consumer may override is `target-version`
# (each repo has a different Python floor).

target-version = "py311"
line-length = 120

[lint]
select = [
    "E", "F", "W",
    "I",
    "B",
    "D",
    "ANN",
    "UP",
    "RUF",
]
# ANN401 forbids `Any`. In practice it fires constantly on bridges to
# untyped libraries (Streamlit, llama-index, ML libs without stubs) where
# typing the seam with anything other than Any costs more than it saves.
# Strict mypy is the actual rigor here; ANN401 adds noise on top.
ignore = ["ANN401"]

[lint.pydocstyle]
convention = "google"
