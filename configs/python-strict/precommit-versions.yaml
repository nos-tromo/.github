# Canonical pre-commit hook versions for the strict regime.
#
# - ruff: pinned to a release rev of astral-sh/ruff-pre-commit; consumers
#   mirror the rev exactly.
# - pyrefly: NOT pinned to a pre-commit rev. pyrefly needs to see every dep's
#   types (FastAPI/pydantic/OpenAI-SDK decorators, base classes, return types)
#   and pre-commit's isolated env can't keep up with each repo's dep set. The
#   canonical pyrefly hook is a *local* hook that runs `uv run pyrefly check`
#   so it uses the project's venv. Pin the pyrefly version in your dev deps
#   (e.g. `pyrefly==1.1.1`) — the validator checks that pin instead.

ruff: v0.15.14
pyrefly: "1.1.1"  # checked against pyproject dev deps, not a pre-commit rev
