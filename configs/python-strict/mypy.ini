# Canonical strict mypy config for nos-tromo Python apps.
#
# Mirror this section into each consumer's pyproject.toml under
# [tool.mypy]. The validate_strict_config.py check in python-app-ci.yml
# diffs the consumer's [tool.mypy] block against this file and fails CI
# on drift.
#
# ignore_missing_imports is intentionally kept on: without it, every
# untyped third-party library (Streamlit, the Neo4j driver, etc.)
# poisons strict mode for first-party code. Strict applies to code we
# control; transitive untyped imports are out of scope.

[mypy]
strict = true
ignore_missing_imports = true
no_incremental = true
