# Drifted smoke-test fixture: ruff hook is aligned but mypy is on an older
# rev. The validator should report the mypy drift and exit non-zero.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.0
    hooks:
      - id: mypy
