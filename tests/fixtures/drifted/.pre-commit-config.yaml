# Drifted smoke-test fixture: the pyrefly local hook is absent (still has the
# old mypy hook instead), so the validator's required `uv run pyrefly check`
# substring is missing. The validator should exit non-zero.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.0
    hooks:
      - id: mypy
