# Drifted smoke-test fixture: deliberately mismatches canonical on one key
# (line-length=100 instead of 120). The validator should report drift and
# exit non-zero against this fixture; if it exits 0, the diff logic in
# _diff() has regressed.

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "D", "ANN", "UP", "RUF"]
ignore = ["ANN401"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.mypy]
strict = true
ignore_missing_imports = true
no_incremental = true
