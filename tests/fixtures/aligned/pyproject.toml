# Aligned smoke-test fixture: the [tool.ruff] and [tool.mypy] blocks below
# mirror configs/python-strict/{ruff.toml,mypy.ini} exactly, with one
# deliberate exception — `target-version` is set to py312 to exercise the
# ALLOWED_RUFF_OVERRIDES path. The validator should exit 0 against this
# fixture; if it doesn't, that's a regression in the validator (the diff
# logic, the override allowlist, or the canonical-config loaders).
#
# When canonical/python-strict/ changes, this file must be updated to match.
# The self-ci workflow will fail until it is — that's the same drift signal
# real consumers get, applied to this fixture.

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "D", "ANN", "UP", "RUF"]
ignore = ["ANN401"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.mypy]
strict = true
ignore_missing_imports = true
no_incremental = true

# Canonical v2.2+ pins mypy in dev deps (the validator no longer pins it
# via the pre-commit hook rev). The version must match the `mypy:` entry
# in configs/python-strict/precommit-versions.yaml.
[dependency-groups]
dev = [
    "mypy==1.19.0",
]
