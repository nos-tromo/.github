# Aligned smoke-test fixture: ruff hook rev matches
# configs/python-strict/precommit-versions.yaml, and pyrefly is a `local` hook
# (per canonical v2.3+) so it would run against the project venv in a real
# consumer. The validator should exit 0 against this fixture; if it doesn't,
# something has regressed in _extract_precommit_rev or the local-pyrefly check.
#
# When precommit-versions.yaml changes, this file must be updated to match.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: local
    hooks:
      - id: pyrefly
        name: pyrefly
        entry: uv run pyrefly check
        language: system
        types: [python]
        require_serial: true
        pass_filenames: false
